name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install .[dev]
      - name: Ruff
        run: ruff check src tests
      - name: Tests
        run: pytest -q

  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
      - name: Init
        run: terraform init -backend=false
      - name: Format
        run: terraform fmt -check -recursive
      - name: Validate
        run: terraform validate

  validator-feedback:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/validator-feedback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax check (ESM)
        run: |
          node --check src/index.js
          node --check examples/globalErrorHook.js
